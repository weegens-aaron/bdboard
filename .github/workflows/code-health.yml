name: code-health

# Mechanical code-health gates (bdboard-ndm).
#
# Rationale: bd *formulas* SPAWN work, they do not RUN checks. The
# deterministic pass/fail checks live HERE and gate every PR; the
# code-health-audit formula (bdboard-jyf) TRIAGES this output rather than
# re-running the tools.
#
# Note on package indexes: these jobs run on public GitHub-hosted runners,
# which reach public PyPI / npm directly. The Walmart artifactory proxy used
# in local dev (Makefile PY_INDEX) is intentionally NOT used here because it
# is only reachable on the Walmart network.

on:
  push:
    branches: [main, working]
  pull_request:

permissions:
  contents: read

concurrency:
  group: code-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff (lint + format + F401/dead-code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: ruff check (incl. F401 unused-import / dead-code signals)
        run: uvx ruff check src/ tests/
      - name: ruff format --check
        run: uvx ruff format --check src/ tests/

  dead-code:
    name: vulture (dead-code sweep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # >=80% confidence keeps false positives out of a hard gate.
      - run: uvx vulture src/ --min-confidence 80

  tests:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # uv won't install into the runner's externally-managed system Python
      # (PEP 668). Create a project venv and install into that instead of
      # using --system, which uv refuses. (bdboard-b6i)
      - name: install project
        run: |
          uv venv
          uv pip install -e .
      # --no-sync: the venv is already populated by `uv pip install -e .` above
      # (resolved against PUBLIC PyPI). Without it, `uv run` re-syncs from
      # uv.lock, whose pinned URLs point at the Walmart artifactory proxy —
      # unreachable from public GitHub runners (DNS failure). See header note
      # + bdboard-b6i. We intentionally run the public-PyPI venv, not the lock.
      - name: pytest
        run: uv run --no-sync python -m pytest -q

  duplication:
    name: jscpd (copy-paste detector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Reads .jscpd.json (single source of truth for min-tokens/threshold).
      - run: npx --yes jscpd

  dependencies:
    name: pip-audit + outdated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Install into a project venv (not --system; uv refuses to touch the
      # runner's externally-managed Python, PEP 668). pip-audit must run
      # against THIS venv so it sees the resolved dependency tree — hence
      # `uv run --with pip-audit` rather than an isolated `uvx pip-audit`,
      # which would audit an empty throwaway env and silently find nothing.
      # (bdboard-b6i: the old --system install crashed, skipping the scan.)
      - name: install project (so pip-audit sees the resolved env)
        run: |
          uv venv
          uv pip install -e .
      # --no-sync for the same reason as the pytest job: don't let `uv run`
      # re-sync from uv.lock (Walmart-proxy URLs, unreachable here). pip-audit
      # is overlaid via --with and audits the public-PyPI venv installed above.
      - name: pip-audit (CVE scan) — hard gate
        run: uv run --no-sync --with pip-audit pip-audit
      - name: uv pip list --outdated (advisory, never fails)
        run: uv pip list --outdated || true
