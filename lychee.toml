# lychee link-checker config (bdboard-mol-003)
# Reproducible broken-link sweep for all repo markdown.
# Run via: make links

# Check in-document anchors/fragments (e.g. [foo](#section)).
include_fragments = true

# Be a good citizen with external hosts.
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# Treat redirects as OK (e.g. steveyegge/beads -> gastownhall/beads).
accept = ["200..=299", "301", "302", "307", "308"]

# Skip noise: virtualenvs, caches, deps, VCS internals.
#
# NB: exclude_path entries are REGEXES matched against the whole path, not
# literal substrings. An unanchored ".git" matches "-git" too (the `.` is the
# any-char metachar), which silently dropped docs/decisions/
# 0003-beads-sync-via-dolt-git-refs.md from the sweep. Anchor every entry to a
# path boundary -- (^|/)NAME(/|$) -- and escape literal dots so we only ever
# exclude real directory names. (bdboard-mol-h8p)
exclude_path = [
    "(^|/)\\.venv(/|$)",
    "(^|/)node_modules(/|$)",
    "(^|/)\\.pytest_cache(/|$)",
    "(^|/)\\.ruff_cache(/|$)",
    "(^|/)\\.git(/|$)",
]

# Don't hammer mailto/tel links (off by default; explicit for clarity).
include_mail = false

# Ignore template placeholder links (e.g. the ADR template's
# [NNNN](NNNN-….md) example). These are intentional placeholders, not
# real targets, and must not fail the sweep. Matches the literal
# placeholder filename in any form (raw or percent-encoded ellipsis).
exclude = [
    "NNNN-",
]
