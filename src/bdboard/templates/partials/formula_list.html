{# Formula picker — HTMX swap target for /api/formulas.
   A single <select> dropdown of formulas. Choosing one fires an HTMX GET to
   /api/formulas/{name}/form, swapping its variable form into #formula-form —
   preserving the existing two-step pour flow. The load-error state is rendered
   by the route (app.py); this partial owns the populated + empty states.
   Symmetric with partials/memory_list.html. #}

{% if formulas %}
<div class="formula-picker">
  <label class="formula-picker-label" for="formula-select">Formula</label>
  <select
    id="formula-select"
    class="formula-select"
    aria-label="Choose a formula to pour"
    autocomplete="off"
    hx-on:change="if (this.value) htmx.ajax('GET', '/api/formulas/' + encodeURIComponent(this.value) + '/form', {target: '#formula-form', swap: 'innerHTML'})"
  >
    <option value="" selected>Choose a formula…</option>
    {% for f in formulas %}
    <option value="{{ f.name }}"{% if f.description %} title="{{ f.description }}"{% endif %}>
      {{ f.name }}{% if f.description %} — {{ f.description }}{% endif %}
    </option>
    {% endfor %}
  </select>
</div>
{% else %}
<p class="formula-empty muted">
  No formulas found — add one under <code>.beads/formulas/</code> or run
  <code>bd formula</code> to create one.
</p>
{% endif %}
